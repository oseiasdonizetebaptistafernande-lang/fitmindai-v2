<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>FitMind AI</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
color:white;
padding:30px;
}

.container{
max-width:1400px;
margin:auto;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
flex-wrap:wrap;
gap:20px;
}

.logo{
display:flex;
align-items:center;
gap:15px;
}

.logo-box{
width:70px;
height:70px;
background:#00ff88;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
font-size:35px;
font-weight:bold;
color:black;
box-shadow:0 0 25px #00ff88;
}

.logo h1{
font-size:40px;
}

.subtitle{
color:#00ff88;
font-size:20px;
margin-top:5px;
}

.generate-btn{
background:#00ff88;
border:none;
padding:18px 30px;
border-radius:18px;
font-size:18px;
font-weight:600;
cursor:pointer;
color:black;
margin-top:20px;
width:100%;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#0b0b0b;
border:1px solid #1d1d1d;
border-radius:25px;
padding:25px;
box-shadow:0 0 20px rgba(0,255,120,0.06);
}

.card h3{
color:#00ff88;
margin-bottom:15px;
font-size:22px;
}

.card p{
color:#ccc;
line-height:1.7;
}

input,
select{
width:100%;
margin-top:10px;
padding:16px;
background:#101010;
border:1px solid #222;
border-radius:15px;
color:white;
font-size:16px;
outline:none;
}

.section-title{
font-size:30px;
margin:40px 0 20px;
color:#00ff88;
}

.workout{
background:#0c0c0c;
border-radius:25px;
padding:30px;
margin-bottom:25px;
border:1px solid #1f1f1f;
}

.workout h2{
color:#00ff88;
margin-bottom:20px;
font-size:28px;
}

.resultado{
line-height:1.9;
color:#ddd;
white-space:pre-wrap;
font-size:16px;
}

.footer{
margin-top:50px;
text-align:center;
font-size:26px;
color:#00ff88;
font-weight:700;
}

@media(max-width:900px){

.logo h1{
font-size:30px;
}

.section-title{
font-size:24px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="top">

<div class="logo">

<div class="logo-box">
🔥
</div>

<div>

<h1>FitMind AI</h1>

<div class="subtitle">
Plano de treino inteligente
</div>

</div>

</div>

</div>

<form action="/gerar" method="POST">

<div class="grid">

<div class="card">

<h3>🎯 Objetivo</h3>

<input type="text"
name="objetivo"
placeholder="Ex: Hipertrofia"
required>

</div>

<div class="card">

<h3>⚖️ Peso</h3>

<input type="text"
name="peso"
placeholder="Ex: 80kg"
required>

</div>

<div class="card">

<h3>📏 Altura</h3>

<input type="text"
name="altura"
placeholder="Ex: 1.80"
required>

</div>

<div class="card">

<h3>🔥 Nível</h3>

<select name="nivel">

<option>Leve</option>
<option>Moderado</option>
<option>Pesado</option>
<option>Extremo</option>

</select>

</div>

<div class="card">

<h3>📅 Segunda</h3>

<input type="text"
name="segunda"
placeholder="Ex: Peito e tríceps">

</div>

<div class="card">

<h3>📅 Terça</h3>

<input type="text"
name="terca"
placeholder="Ex: Costas e bíceps">

</div>

<div class="card">

<h3>📅 Quarta</h3>

<input type="text"
name="quarta"
placeholder="Ex: Pernas">

</div>

<div class="card">

<h3>📅 Quinta</h3>

<input type="text"
name="quinta"
placeholder="Ex: Ombro">

</div>

<div class="card">

<h3>📅 Sexta</h3>

<input type="text"
name="sexta"
placeholder="Ex: Cardio e abdômen">

</div>

</div>

<button class="generate-btn">
🚀 Gerar treino inteligente
</button>

</form>

{% if resposta %}

<div class="section-title">
🔥 Seu Plano de Treino
</div>

<div class="workout">

<div class="resultado">
{{ resposta|safe }}
</div>

</div>

{% endif %}

<div class="footer">
🔥 FOCO • DISCIPLINA • RESULTADOS 🔥
</div>

</div>

</body>
</html>
