<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>FitMind AI</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
color:white;
padding:30px;
}

.container{
max-width:1400px;
margin:auto;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
flex-wrap:wrap;
gap:20px;
}

.logo{
display:flex;
align-items:center;
gap:15px;
}

.logo-box{
width:70px;
height:70px;
background:#00ff88;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
font-size:35px;
font-weight:bold;
color:black;
box-shadow:0 0 25px #00ff88;
}

.logo h1{
font-size:40px;
}

.subtitle{
color:#00ff88;
font-size:20px;
margin-top:5px;
}

.generate-btn{
background:#00ff88;
border:none;
padding:18px 30px;
border-radius:18px;
font-size:18px;
font-weight:600;
cursor:pointer;
color:black;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#0b0b0b;
border:1px solid #1d1d1d;
border-radius:25px;
padding:25px;
box-shadow:0 0 20px rgba(0,255,120,0.06);
}

.card h3{
color:#00ff88;
margin-bottom:15px;
font-size:22px;
}

.card p{
color:#ccc;
line-height:1.7;
}

.section-title{
font-size:30px;
margin:40px 0 20px;
color:#00ff88;
}

.workout{
background:#0c0c0c;
border-radius:25px;
padding:30px;
margin-bottom:25px;
border:1px solid #1f1f1f;
}

.workout h2{
color:#00ff88;
margin-bottom:20px;
font-size:28px;
}

table{
width:100%;
border-collapse:collapse;
}

table th{
background:#151515;
padding:15px;
color:#00ff88;
}

table td{
padding:15px;
border-bottom:1px solid #222;
}

.footer{
margin-top:50px;
text-align:center;
font-size:26px;
color:#00ff88;
font-weight:700;
}

@media(max-width:900px){

.logo h1{
font-size:30px;
}

.section-title{
font-size:24px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="top">

<div class="logo">

<div class="logo-box">
🔥
</div>

<div>

<h1>FitMind AI</h1>

<div class="subtitle">
Plano de treino inteligente
</div>

</div>

</div>

<form action="/gerar" method="POST">

<button class="generate-btn">
Gerar treino
</button>

</form>

</div>
