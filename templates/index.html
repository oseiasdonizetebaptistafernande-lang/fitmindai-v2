<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>FitMind AI</title>

<link rel="stylesheet"
href="/static/style.css">

</head>

<body>

<div class="container">

<h1>FitMind AI 🔥</h1>

<p>
Bem-vindo {{ usuario }}
</p>

<form action="/gerar" method="POST">

<input
type="text"
name="objetivo"
placeholder="Seu objetivo"
required
>

<input
type="text"
name="peso"
placeholder="Seu peso"
required
>

<input
type="text"
name="altura"
placeholder="Sua altura"
required
>

<select name="intensidade">

<option value="leve">
Leve
</option>

<option value="moderado">
Moderado
</option>

<option value="pesado">
Pesado
</option>

<option value="extremo">
Extremo
</option>

</select>

<input
type="text"
name="segunda"
placeholder="Treino de segunda"
required
>

<input
type="text"
name="terca"
placeholder="Treino de terça"
required
>

<input
type="text"
name="quarta"
placeholder="Treino de quarta"
required
>

<input
type="text"
name="quinta"
placeholder="Treino de quinta"
required
>

<input
type="text"
name="sexta"
placeholder="Treino de sexta"
required
>

<button type="submit">
Gerar treino
</button>

</form>

{% if treino %}

<div class="resultado">

<pre>{{ treino }}</pre>

</div>

{% endif %}

<a href="/logout">
Sair
</a>

</div>

</body>
</html>
