<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Plano de Treino</title>

<style>

body{
    background:#050505;
    color:white;
    font-family:Arial;
    padding:20px;
}

.container{
    max-width:1200px;
    margin:auto;
}

h1{
    color:#00ff88;
    font-size:40px;
    margin-bottom:10px;
}

.sub{
    color:#00ff88;
    margin-bottom:40px;
}

.card{
    background:#111;
    border:1px solid #222;
    border-radius:20px;
    padding:20px;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

h2{
    color:#00ff88;
}

pre{
    white-space:pre-wrap;
    font-size:18px;
    line-height:1.8;
}

</style>
</head>

<body>

<div class="container">

<h1>PLANO DE TREINO</h1>
<div class="sub">{{ objetivo }}</div>

<div class="grid">

<div class="card">
<h2>PESO</h2>
<p>{{ peso }}</p>
</div>

<div class="card">
<h2>ALTURA</h2>
<p>{{ altura }}</p>
</div>

<div class="card">
<h2>NÍVEL</h2>
<p>{{ nivel }}</p>
</div>

<div class="card">
<h2>DIAS</h2>
<p>{{ dias }}</p>
</div>

</div>

<div class="card">
<pre>{{ treino }}</pre>
</div>

</div>

</body>
</html>
